    </div>
  </div>

  <nav class="nav">
    <div class="nav-section">Principal</div>

    <a class="nav-item" [class.active]="active === 'dashboard'" routerLink="/dashboard">
      <span class="icon">📊</span> Dashboard
    </a>

    <a class="nav-item" [class.active]="active === 'inventario'" routerLink="/inventario">
      <span class="icon">📦</span> Inventario <span class="nav-badge">3</span>

    <a class="nav-item" href="javascript:void(0)"><span class="icon">👥</span> Usuarios</a>

      <div class="user-info">

        <div class="user-role">Administrador</div>
      </div>

<div class="main">
  <div class="topbar">
    <div>
      <div class="page-title">{{ pageTitle }}</div>
      <div class="page-path">{{ pagePath }}</div>
    </div>
    <div class="topbar-right">
      <div class="topbar-date">📅 Miercoles, 22 Abr 2026</div>
      <div class="notif-btn">🔔<div class="notif-dot"></div></div>
    </div>
